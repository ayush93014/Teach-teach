<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatbot design for education</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 16px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: radial-gradient(circle at top left, rgba(59, 130, 246, 0.15), transparent 25%),
          radial-gradient(circle at bottom right, rgba(168, 85, 247, 0.18), transparent 20%),
          linear-gradient(180deg,     #eff6ff 0%, #fdf2f8 100%);
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .chat-shell {
        width: min(100%, 380px);
        height: 100%;
        max-height: 650px;
        display: flex;
        flex-direction: column;
        border-radius: 28px;
        overflow: hidden;
        background: white;
        box-shadow: 0 32px 80px rgba(15, 23, 42, 0.14);
      }

      .chat-header {
        position: relative;
        padding: 24px 20px;
        display: flex;
        align-items: center;
        gap: 14px;
        background: linear-gradient(90deg, #2563eb 0%, #7c3aed 100%);
        color: white;
      }

      .header-glow {
        position: absolute;
        inset: 0;
        opacity: 0.18;
        background-image: radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.6), transparent 30%),
          radial-gradient(circle at 85% 40%, rgba(255, 255, 255, 0.3), transparent 28%);
      }

      .avatar {
        position: relative;
        z-index: 1;
        width: 44px;
        height: 44px;
        display: grid;
        place-items: center;
        border-radius: 9999px;
        background: rgba(255, 255, 255, 0.22);
        backdrop-filter: blur(14px);
      }

      .avatar svg {
        width: 22px;
        height: 22px;
      }

      .header-title {
        position: relative;
        z-index: 1;
      }

      .header-title h1 {
        margin: 0;
        font-size: 1rem;
        line-height: 1.2;
        font-weight: 700;
      }

      .header-title p {
        margin: 6px 0 0;
        font-size: 0.77rem;
        color: rgba(255, 255, 255, 0.84);
      }

      .chat-body {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        background: linear-gradient(180deg, #f8fafc 0%, #ffffff 100%);
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .quick-actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .quick-action {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        border-radius: 14px;
        border: 1px solid #e9d5ff;
        background: white;
        color: #7c3aed;
        font-size: 0.76rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 180ms ease, background-color 180ms ease, border-color 180ms ease;
      }

      .quick-action:hover {
        transform: translateY(-1px);
        background: #f5f3ff;
        border-color: #ddd6fe;
      }

      .message-row {
        display: flex;
        gap: 10px;
        align-items: flex-start;
      }

      .message-row.user {
        flex-direction: row-reverse;
      }

      .message-avatar {
        width: 28px;
        min-width: 28px;
        height: 28px;
        display: grid;
        place-items: center;
        border-radius: 9999px;
        color: white;
        box-shadow: 0 6px 16px rgba(15, 23, 42, 0.12);
      }

      .message-avatar.bot {
        background: linear-gradient(135deg, #2563eb, #7c3aed);
      }

      .message-avatar.user {
        background: linear-gradient(135deg, #ec4899, #f97316);
      }

      .message-bubble {
        max-width: 75%;
        padding: 14px 16px;
        border-radius: 24px;
        position: relative;
        overflow-wrap: break-word;
      }

      .message-bubble.bot {
        background: white;
        color: #111827;
        border: 1px solid #e5e7eb;
        border-top-left-radius: 12px;
      }

      .message-bubble.user {
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        color: white;
        border-top-right-radius: 12px;
      }

      .message-text {
        margin: 0;
        font-size: 0.93rem;
        line-height: 1.6;
        white-space: pre-wrap;
      }

      .message-time {
        display: block;
        margin-top: 8px;
        font-size: 0.7rem;
        opacity: 0.7;
      }

      .typing-indicator {
        display: inline-flex;
        gap: 5px;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 9999px;
        background: #9ca3af;
        animation: bounce 1s infinite ease-in-out;
      }

      .dot:nth-child(2) {
        animation-delay: 0.15s;
      }

      .dot:nth-child(3) {
        animation-delay: 0.3s;
      }

      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-4px);
        }
      }

      .chat-footer {
        padding: 18px 20px;
        border-top: 1px solid #e5e7eb;
        background: white;
      }

      .composer {
        display: flex;
        gap: 12px;
        align-items: flex-end;
      }

      .composer textarea {
        flex: 1;
        min-height: 46px;
        max-height: 90px;
        resize: none;
        padding: 14px 16px;
        border-radius: 18px;
        border: 1px solid #e5e7eb;
        background: #f3f4f6;
        font-size: 0.95rem;
        line-height: 1.4;
        color: #111827;
        transition: border-color 180ms ease, background-color 180ms ease, box-shadow 180ms ease;
      }

      .composer textarea:focus {
        outline: none;
        border-color: #8b5cf6;
        background: white;
        box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.08);
      }

      .send-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 52px;
        height: 52px;
        border-radius: 18px;
        border: none;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        color: white;
        cursor: pointer;
        transition: transform 180ms ease, box-shadow 180ms ease, opacity 180ms ease;
      }

      .send-button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      .send-button:hover:not(:disabled) {
        transform: translateY(-1px);
        box-shadow: 0 16px 30px rgba(37, 99, 235, 0.22);
      }

      .send-button svg {
        width: 22px;
        height: 22px;
      }
    </style>
  </head>

  <body>
    <div class="chat-shell" role="application" aria-label="Chatbot interface">
      <div class="chat-header">
        <div class="header-glow" aria-hidden="true"></div>
        <div class="avatar" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2l2 4 4 .75-3 2.8.75 4-3.75-2-3.75 2 .75-4-3-2.8 4-.75 2-4z" />
          </svg>
        </div>
        <div class="header-title">
          <h1>AI Learning Assistant</h1>
          <p>Always here to help</p>
        </div>
      </div>

      <div class="chat-body" id="chatBody">
        <div class="quick-actions" id="quickActions"></div>
      </div>

      <div class="chat-footer">
        <form id="chatForm" class="composer" autocomplete="off">
          <textarea id="chatInput" placeholder="Type your question here..." rows="1"></textarea>
          <button type="submit" class="send-button" id="sendButton" aria-label="Send message">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </form>
      </div>
    </div>

    <script>
      const suggestedQuestions = [
        "Explain this concept simply",
        "What are the key points?",
        "Can you give an example?",
        "How does this work?",
      ];
      const CHAT_API_URL = window.CHAT_API_URL || "http://localhost:3001/api/chat";

      const defaultMessage = {
        id: "1",
        sender: "bot",
        text: "Hello! I'm here to help you understand concepts from your lectures. What would you like to learn about?",
        timestamp: new Date().toISOString(),
      };

      const chatBody = document.getElementById("chatBody");
      const chatForm = document.getElementById("chatForm");
      const chatInput = document.getElementById("chatInput");
      const sendButton = document.getElementById("sendButton");
      const quickActions = document.getElementById("quickActions");

      let messages = [defaultMessage];
      let isTyping = false;
      let isComposing = false;
      let lastIssueType = "other";

      function formatTime(dateString) {
        return new Date(dateString).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      }

      function createIcon(type) {
        if (type === "bot") {
          return `
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 3c-4.42 0-8 1.79-8 4v5.5c0 2.21 3.58 4 8 4s8-1.79 8-4V7c0-2.21-3.58-4-8-4Z" />
              <path d="M9 9h.01M15 9h.01M8 16h8" />
            </svg>
          `;
        }

        return `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
          </svg>
        `;
      }

      function escapeHtml(text) {
        return String(text)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function formatMessageContent(message) {
        return `<p class="message-text">${escapeHtml(message.text).replaceAll("\n", "<br>")}</p>`;
      }

      function renderQuickActions() {
        quickActions.innerHTML = "";

        suggestedQuestions.forEach((question) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "quick-action";
          button.textContent = question;
          button.addEventListener("click", () => {
            appendMessage("user", question);
            submitQuestion(question);
          });
          quickActions.appendChild(button);
        });
      }

      function renderMessages() {
        chatBody.innerHTML = "";
        renderQuickActions();
        chatBody.appendChild(quickActions);

        messages.forEach((message) => {
          const row = document.createElement("div");
          row.className = `message-row ${message.sender}`;

          const avatar = document.createElement("div");
          avatar.className = `message-avatar ${message.sender}`;
          avatar.innerHTML = createIcon(message.sender);

          const bubble = document.createElement("div");
          bubble.className = `message-bubble ${message.sender}`;
          bubble.innerHTML = `
            ${formatMessageContent(message)}
            <span class="message-time">${formatTime(message.timestamp)}</span>
          `;

          row.append(avatar, bubble);
          chatBody.appendChild(row);
        });

        if (isTyping) {
          const row = document.createElement("div");
          row.className = "message-row";

          const avatar = document.createElement("div");
          avatar.className = "message-avatar bot";
          avatar.innerHTML = createIcon("bot");

          const bubble = document.createElement("div");
          bubble.className = "message-bubble bot";
          bubble.innerHTML = `
            <div class="typing-indicator">
              <span class="dot"></span>
              <span class="dot"></span>
              <span class="dot"></span>
            </div>
          `;

          row.append(avatar, bubble);
          chatBody.appendChild(row);
        }

        requestAnimationFrame(() => {
          chatBody.scrollTop = chatBody.scrollHeight;
        });
      }

      function appendMessage(sender, text) {
        messages.push({
          id: String(Date.now()),
          sender,
          text,
          timestamp: new Date().toISOString(),
        });
        renderMessages();
      }

      function classifyMessage(text) {
        const normalized = text.toLowerCase();

        const unresolvedKeywords = ["not working", "still issue", "still not working", "same issue"];
        const technicalKeywords = [
          "login",
          "log in",
          "class not opening",
          "class won't open",
          "site bug",
          "bug",
          "error",
          "crash",
          "portal",
          "website",
          "app issue",
          "technical",
          "password",
          "otp",
        ];
        const attendanceKeywords = ["attendance", "absent", "present", "proxy", "leave", "medical leave"];
        const assignmentKeywords = ["assignment", "homework", "submission", "deadline", "project", "plagiarism"];
        const conceptKeywords = [
          "what is",
          "explain",
          "concept",
          "difference between",
          "how does",
          "why",
          "example",
          "teach",
        ];

        if (unresolvedKeywords.some((keyword) => normalized.includes(keyword))) {
          return "technical_issue";
        }
        if (technicalKeywords.some((keyword) => normalized.includes(keyword))) {
          return "technical_issue";
        }
        if (attendanceKeywords.some((keyword) => normalized.includes(keyword))) {
          return "attendance_issue";
        }
        if (assignmentKeywords.some((keyword) => normalized.includes(keyword))) {
          return "assignment_issue";
        }
        if (conceptKeywords.some((keyword) => normalized.includes(keyword)) || normalized.endsWith("?")) {
          return "concept_question";
        }
        return "other";
      }

      function createAssistantResponseObject(userText) {
        const normalized = userText.toLowerCase();
        const unresolved = ["not working", "still issue", "still not working", "same issue"].some((keyword) =>
          normalized.includes(keyword)
        );
        const isGreeting = ["hi", "hello", "hey", "hii", "helo"].some((word) => {
          return normalized === word || normalized.startsWith(`${word} `);
        });
        const type = classifyMessage(userText);
        lastIssueType = type;

        let reply = "";
        let escalate = false;

        if (type === "technical_issue") {
          reply = `1) Log out and log in again.\n2) Clear browser cache, then reopen the portal.\n3) Try incognito mode or another browser.\n4) Check internet and college server status.\n5) If still failing, share screenshot + error text.`;
          escalate = unresolved;
        } else if (type === "attendance_issue") {
          reply =
            "Check attendance entries for date/subject first.\nKeep proof (medical note, approved leave, screenshots).\nSubmit a correction request in the portal.\nIf not updated in 24-48 hrs, contact your class mentor/faculty.";
          escalate = unresolved || normalized.includes("urgent");
        } else if (type === "assignment_issue") {
          reply =
            "- Confirm deadline, file format, and word/page limit.\n- Match rubric points before final upload.\n- Rename file correctly and recheck plagiarism if required.\n- Upload, then save submission receipt/screenshot.\nNeed help reviewing your draft quickly?";
          escalate = false;
        } else if (type === "concept_question") {
          reply =
            "Got it. I will explain this in simple beginner language.\nI can give: definition -> real-life example -> quick recap.\nPlease share the exact topic/chapter name so I keep it focused.";
          escalate = false;
        } else if (isGreeting) {
          reply = "Hello! How can I help you today?";
          escalate = false;
        } else {
          reply =
            "I can help with technical, attendance, assignment, or concept doubts.\nPlease share your issue in one line with key details.\nExample: 'Login error after OTP' or 'Attendance missing for Monday'.";
          escalate = unresolved;
        }

        return {
          type,
          reply,
          escalate,
        };
      }

      async function getAssistantResponseObject(userText) {
        try {
          const response = await fetch(CHAT_API_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ message: userText }),
          });

          if (!response.ok) {
            throw new Error(`Chat API failed: ${response.status}`);
          }

          const parsed = await response.json();
          if (!parsed?.reply || !parsed?.type || typeof parsed?.escalate !== "boolean") {
            throw new Error("Invalid API JSON shape");
          }

          return parsed;
        } catch (error) {
          console.error(error);
          const fallback = createAssistantResponseObject(userText);
          return {
            ...fallback,
            reply: `${fallback.reply}\n\n(Using fallback response: backend API unavailable.)`,
          };
        }
      }

      async function submitQuestion(text) {
        if (isTyping) return;
        isTyping = true;
        renderMessages();
        chatInput.value = "";
        sendButton.disabled = true;

        window.setTimeout(async () => {
          const assistantResponse = await getAssistantResponseObject(text);
          isTyping = false;
          appendMessage("bot", assistantResponse.reply);
          sendButton.disabled = false;
        }, 1200);
      }

      chatForm.addEventListener("submit", (event) => {
        event.preventDefault();
        const text = chatInput.value.trim();
        if (!text || isTyping) return;
        appendMessage("user", text);
        submitQuestion(text);
      });

      chatInput.addEventListener("input", () => {
        sendButton.disabled = !chatInput.value.trim();
      });

      chatInput.addEventListener("compositionstart", () => {
        isComposing = true;
      });

      chatInput.addEventListener("compositionend", () => {
        isComposing = false;
      });

      chatInput.addEventListener("keydown", (event) => {
        if (event.key !== "Enter" || isComposing) return;
        if (event.shiftKey) return;

        event.preventDefault();
        chatForm.requestSubmit();
      });

      renderMessages();
    </script>
  </body>
</html>
